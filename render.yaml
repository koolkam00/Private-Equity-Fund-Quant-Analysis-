services:
  - type: web
    name: pe-portfolio-lab
    runtime: python
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m flask --app app db-upgrade
    startCommand: gunicorn wsgi:app
    healthCheckPath: /readyz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: MEMO_STORAGE_BACKEND
        value: db
      - key: MEMO_INLINE_JOBS
        value: "false"
      - key: MEMO_LLM_PROVIDER
        value: openai
      - key: MEMO_LLM_MODEL_STYLE
        value: gpt-5-mini
      - key: MEMO_LLM_MODEL_OUTLINE
        value: gpt-5-mini
      - key: MEMO_LLM_MODEL_DRAFT
        value: gpt-5.4
      - key: MEMO_LLM_MODEL_VALIDATE
        value: gpt-5.4
      - key: OPENAI_API_KEY
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_TEAM_NAME
        value: Admin Team
      - key: DATABASE_URL
        fromDatabase:
          name: pe-portfolio-lab-db
          property: connectionString
  - type: worker
    name: pe-portfolio-lab-memo-worker
    runtime: python
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m flask --app app db-upgrade
    startCommand: python -m flask --app app memo-worker
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: MEMO_STORAGE_BACKEND
        value: db
      - key: MEMO_INLINE_JOBS
        value: "false"
      - key: MEMO_LLM_PROVIDER
        value: openai
      - key: MEMO_LLM_MODEL_STYLE
        value: gpt-5-mini
      - key: MEMO_LLM_MODEL_OUTLINE
        value: gpt-5-mini
      - key: MEMO_LLM_MODEL_DRAFT
        value: gpt-5.4
      - key: MEMO_LLM_MODEL_VALIDATE
        value: gpt-5.4
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pe-portfolio-lab-db
          property: connectionString

databases:
  - name: pe-portfolio-lab-db
    databaseName: pe_portfolio_lab
    user: pe_portfolio_lab
